<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dream</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">Dream</div>
      <div id="statusLabel" class="status">Prêt</div>
    </header>

    <main class="main-area">
      <section id="welcomeScreen" class="welcome-screen">
        <div class="welcome-inner">
          <h1>Dream</h1>
          <p class="welcome-subtitle">
            Une boussole pour ton orientation.
          </p>
          <p class="welcome-text">
            Pose une question sur tes études, ton avenir,
            les parcours possibles, les écoles,
            les compétences à renforcer ou les options
            qui pourraient te correspondre.
          </p>
        </div>
      </section>

      <section id="chatStage" class="chat-stage">
        <div id="chatBox" class="chat-box"></div>
      </section>
    </main>

    <footer class="composer-wrap">
      <div class="composer">
        <button
          class="icon-btn"
          id="micBtn"
          title="Dictée vocale"
          onclick="startVoiceInput()"
        >
          🎤
        </button>

        <textarea
          id="chatInput"
          class="composer-input"
          placeholder="Parle à Dream..."
          onkeydown="handleChatEnter(event)"
          rows="1"
        ></textarea>

        <button class="send-btn" onclick="sendChat()">
          Envoyer
        </button>
        
        <button class="send-btn" onclick="resetConversation()" title="Réinitialiser conversation">
          Réinitialiser la conversation
        </button>
      </div>
    </footer>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
